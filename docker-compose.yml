services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cabeleleila
      POSTGRES_PASSWORD: cabeleleila
      POSTGRES_DB: cabeleleila
    ports:
      - "5432:5432"
    volumes:
      - cabeleleila_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cabeleleila -d cabeleleila"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      DATABASE_URL: postgresql://cabeleleila:cabeleleila@postgres:5432/cabeleleila?schema=public
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      PORT: "3001"
      HOST: "0.0.0.0"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  cabeleleila_pg:
